services:
  - type: web
    name: venushack-rppg
    runtime: python
    plan: free
    rootDir: backend-rppg
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
